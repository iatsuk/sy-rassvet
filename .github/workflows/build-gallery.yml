name: Build photo gallery

on:
  push:
    branches:
      - main
    paths:
      - 'photos/source/**'
      - 'tools/build_gallery.py'
      - 'requirements-gallery.txt'
      - '.github/workflows/build-gallery.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-photo-gallery
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-gallery.txt

      - name: Install image tools
        run: python -m pip install --requirement requirements-gallery.txt

      - name: Build gallery assets
        run: python tools/build_gallery.py

      - name: Commit generated gallery
        run: |
          if git diff --quiet -- gallery-data.js photos/generated; then
            echo 'Gallery is already up to date.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A gallery-data.js photos/generated
          git commit -m 'Build gallery assets [skip ci]'
          git push

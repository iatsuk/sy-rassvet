name: Process gallery photographs

on:
  push:
    branches: [main]
    paths:
      - "photos/**"
      - "tools/build_gallery.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gallery-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-gallery:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install image libraries
        run: python -m pip install --disable-pip-version-check "Pillow>=10,<13" "pillow-heif>=0.16,<2"

      - name: Build optimized gallery
        run: python tools/build_gallery.py

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/gallery
          if git diff --cached --quiet; then
            echo "Gallery assets are already up to date."
            exit 0
          fi
          git commit -m "Build optimized gallery images"
          git push
